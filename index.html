<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assingment_5/assets/github-logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gray-50 min-h-screen">
  
     <!-- Navbar -->
  <nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-2">
            <img  src="./assingment_5/assets/github-logo.png" alt="" width="50px" height="50px">
          <span class="text-xl font-bold text-gray-800 ">GitHub Issues Tracker</span>
        </div>
        <div class="flex items-center space-x-3">
          <div class="relative">
            <input id="searchInput" type="text" placeholder="Search issues..." class="pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </div>
          <button id="searchBtn" class="btn bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">New Issue</button>
        </div>
      </div>
    </div>
  </nav>

  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
     <div class="tabs flex shadow mb-6 mt-7">
      <button data-tab="all" class="tab-btn bg-primary px-6 py-1 rounded-[10px] text-[#ffff] font-medium  border-transparent hover:text-[#ffff] hover:bg-indigo-600 active">All</button>
      <button data-tab="open" class="tab-btn  px-6 py-3 font-medium  rounded-[15px] text-gray-600 border-b-2 border-transparent hover:text-[#ffff] hover:bg-indigo-600 ">Open</button>
      <button data-tab="closed" class="tab-btn px-6 py-3 font-medium  rounded-[15px] text-gray-600 border-b-2 border-transparent hover:text-[#ffff] hover:bg-indigo-600 ">Closed</button>
    </div>


     <div id="stats" class="flex flex-wrap justify-between items-center mb-8 bg-white p-4 rounded-lg shadow-sm">
      <div class=" flex justify-between items-center ">
        <div class="flex items-center space-x-2">
        <img src="./assingment_5/assets/Aperture.png" alt="">
        <div>
            <div class="flex items-center space-x-2">
                <h2 id="issueCount" class="text-2xl font-bold">0</h2>
            <p class="text-[20px] font-bold">issues</p><br>
            </div>
            <p >Track and manage your project issues</p>
        </div>
        </div>
    </div>
    <div class="flex items-center justify-center gap-2">
       <div class="flex items-center justify-center gap-1 "><div class="w-[10px] h-[10px] bg-green-500 rounded-full"></div> open</div>
        <div class="flex items-center justify-center gap-1"><div class="w-[10px] h-[10px] bg-purple-600 rounded-full" ></div>close</div>
    </div>
      <!-- You can add more stats here if needed -->
    </div>

    <!-- Issues Grid -->
    <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <!-- Cards will be inserted here -->
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="hidden text-center py-20">
      <div class="animate-spin inline-block w-12 h-12 border-4 border-t-indigo-600 border-gray-200 rounded-full"></div>
      <p class="mt-4 text-gray-600">Loading issues...</p>
    </div>
  </section>

  <section>
   <div id="issueModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto p-6 relative">
      <button id="closeModal" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-2xl">×</button>
      <h2 id="modalTitle" class="text-2xl font-bold mb-4"></h2>
      <div id="modalContent" class="space-y-4 text-gray-700"></div>
    </div>
  </div>
  </section>
    
  <script type="module" src="script.js"></script>
</body>
</html>
